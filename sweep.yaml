program: src/train.py
project: sweeps-mlp-last
method: random

metric:
  name: test_f1
  goal: maximize

parameters:

  dataset:
    values: ["mnist"]

  epochs:
    value: 5

  batch_size:
    value: 64

  loss:
    values: ["cross_entropy", "mse"]

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]

  learning_rate:
    values: [0.001, 0.0015, 0.002]

  weight_decay:
    values: [0.0, 0.0001, 0.001]

  activation:
    values: ["relu", "tanh", "sigmoid"]

  weight_init:
    values: ["xavier"]

  hidden_size:
    values: [64, 128]

  num_layers:
    values: [1, 2, 3]
